name: "Java Build Action"
description: "Compile and run Java program"

inputs:
 file-name:
  description:"Java file name"
  required: true
runs:
  using: "composite"

  steps:
    - name: Compile Java
      run: javac ${{iputs.file-name}}.java
      shell: bash

    - name: Run Java
      run: java ${{iputs.file-name}}
      shell: bash